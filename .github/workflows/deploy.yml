name: 🚀 Deploy (via Hostinger Git Auto-Deploy)

# Hostinger handles auto-deploy directly from GitHub via Git integration.
# This workflow is kept as a reference but deployment is managed by Hostinger hPanel.

on:
  push:
    branches:
      - main

jobs:
  notify:
    name: ✅ Push recibido
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Confirmar push
        run: echo "Push a main recibido. Hostinger se encarga del auto-deploy via Git integration."
